<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby Pareja ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
    }

    .lobby {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    .card:hover {
      transform: scale(1.05);
      background: #334155;
    }

    .section {
      display: none;
      max-width: 500px;
      margin: 30px auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      display: flex;
      justify-content: space-between;
      background: #334155;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    /* GALERIA */
    #galeria {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .foto-card {
      position: relative;
      background: #0f172a;
      border-radius: 10px;
      overflow: hidden;
    }

    .foto-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .foto-texto {
      padding: 5px;
      font-size: 12px;
      text-align: center;
    }

    .borrar-foto {
      position: absolute;
      top: 5px;
      right: 8px;
      cursor: pointer;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 2px 6px;
      border-radius: 5px;
    }

  </style>
</head>
<body>

  <h1>❤️ Nuestro Lobby</h1>

  <div class="lobby" id="lobby">
    <div class="card" onclick="abrir('metas')">🎯 Metas</div>
    <div class="card" onclick="abrir('chat')">💬 Chat</div>
    <div class="card" onclick="abrir('recuerdos')">📸 Recuerdos</div>
    <div class="card" onclick="abrir('sorpresa')">🎁 Sorpresa</div>
    <div class="card" onclick="abrir('gustos')">❤️ Gustos</div>
  </div>

  <!-- METAS -->
  <div id="metas" class="section">
    <h2>Metas 🎯</h2>
    <input id="metaInput" placeholder="Meta...">
    <button onclick="guardarMeta(document.getElementById('metaInput').value)">Guardar</button>
    <ul id="lista"></ul>
    <button onclick="volver()">⬅ Volver</button>
  </div>

  <!-- RECUERDOS -->
  <div id="recuerdos" class="section">
    <h2>Recuerdos 📸</h2>

    <input type="file" id="fotoInput">
    <textarea id="textoFoto" placeholder="Escribe algo sobre la foto..."></textarea>

    <button onclick="subirFoto()">Subir foto</button>

    <div id="galeria"></div>

    <button onclick="volver()">⬅ Volver</button>
  </div>
  <!-- Sorpresa -->
  <div id="sorpresa" class="section">
   <h2>Sorpresas 🎁</h2>

   <h3>Crear sorpresa</h3>
   <textarea id="mensajeCrear" placeholder="Escribe la sorpresa..."></textarea>
   <input id="clicksNecesarios" type="number" placeholder="Cantidad de clicks">
   <button onclick="crearSorpresa()">Guardar</button>
   <input type="file" id="archivoSorpresa">
   <hr>

   <h3>Descubre la sorpresa</h3>
   <button id="botonSorpresa" onclick="sumarClick()">
  🎁 0 clicks
</button>

   <div id="resultadoSorpresa"></div>

   <button onclick="volver()">⬅ Volver</button>
  </div>
  <!-- CHAT -->
  <div id="chat" class="section">
    <h2>Chat 💬</h2>

    <div id="mensajes" style="max-height:300px; overflow-y:auto; padding:10px;"></div>
    <input id="nombreInput" placeholder="Tu nombre...">
    <input id="mensajeInput" placeholder="Escribe un mensaje...">
    <button onclick="enviarMensaje()">Enviar</button>

    <button onclick="volver()">⬅ Volver</button>
  </div>

  <script>
    function abrir(id) {
      document.getElementById('lobby').style.display = 'none';
      document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }

    function volver() {
      document.getElementById('lobby').style.display = 'grid';
      document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
    }
  </script>

  <script type="module" src="app.js"></script>




 <div id="fotoModal" onclick="if(event.target == this) cerrarModal()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); z-index:1000; justify-content:center; align-items:center; flex-direction:column; cursor:pointer;">
  <span onclick="cerrarModal()" style="position:absolute; top:20px; right:30px; font-size:50px; color:white; cursor:pointer; font-weight:bold;">&times;</span>
  <img id="imgModal" style="max-width:90%; max-height:80%; border-radius:15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); cursor:default;" onclick="event.stopPropagation()">
  <p id="textoModal" style="color:white; margin-top:20px; font-size:1.3rem; text-align:center; padding:0 20px; font-family: 'Segoe UI', sans-serif; cursor:default;" onclick="event.stopPropagation()"></p>
 </div>
</body>
</html>
